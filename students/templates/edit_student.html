<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
</head>
<body>

<h1>Edit Student</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text"
           name="name"
           value="{{ student.name }}">

    <br><br>

    <input type="text"
           name="course"
           value="{{ student.course }}">

    <br><br>

    <button type="submit">
        Update Student
    </button>

</form>

</body>
</html>
